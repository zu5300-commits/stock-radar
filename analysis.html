<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>選股雷達 · 績效規則分析</title>
<style>
  :root{ --bg:#0f1720; --card:#16212e; --line:#26384a; --fg:#e7eef5; --mut:#90a4b6;
         --good:#3fb950; --warn:#d29922; --bad:#f85149; --accent:#4493f8; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--fg);
        font-family:-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif; font-size:15px; line-height:1.5; }
  .wrap{ max-width:920px; margin:0 auto; padding:16px; }
  h1{ font-size:19px; margin:4px 0 2px; }
  .sub{ color:var(--mut); font-size:13px; margin-bottom:14px; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:12px;
         padding:14px 16px; margin:12px 0; }
  .card h2{ font-size:15px; margin:0 0 10px; color:var(--accent); }
  label{ display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  input{ width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--line);
         background:#0c1520; color:var(--fg); font-size:16px; }
  button{ width:100%; margin-top:14px; padding:12px; border:0; border-radius:9px;
          background:var(--accent); color:#fff; font-size:16px; font-weight:600; cursor:pointer; }
  button:disabled{ opacity:.5; }
  .err{ color:var(--bad); font-size:13px; margin-top:10px; min-height:18px; }
  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th,td{ padding:6px 8px; text-align:right; border-bottom:1px solid var(--line); white-space:nowrap; }
  th:first-child,td:first-child{ text-align:left; position:sticky; left:0; background:var(--card); }
  th{ color:var(--mut); font-weight:600; }
  .scroll{ overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .pos{ color:var(--good); } .neg{ color:var(--bad); } .zero{ color:var(--mut); }
  .pill{ display:inline-block; font-size:11px; padding:1px 7px; border-radius:99px;
         background:#1f2d3d; color:var(--mut); }
  .note{ color:var(--mut); font-size:12px; line-height:1.6; }
  .big{ font-size:22px; font-weight:700; }
  .hide{ display:none; }
  .findings li{ margin:6px 0; }
  .topline{ display:flex; gap:14px; flex-wrap:wrap; align-items:baseline; }
  select{ width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
          background:#0c1520; color:var(--fg); font-size:15px; margin-bottom:10px; }
  .chartwrap{ width:100%; overflow-x:auto; }
  .legend{ display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--mut); margin-top:8px; }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 登入 -->
  <div id="login" class="card" style="max-width:380px;margin:48px auto;">
    <h1>選股雷達 · 績效規則分析</h1>
    <div class="sub">此頁含選股研究內容，需帳密登入。</div>
    <label>帳號</label>
    <input id="u" autocomplete="username" autocapitalize="off">
    <label>密碼</label>
    <input id="p" type="password" autocomplete="current-password">
    <label style="display:flex;align-items:center;gap:8px;margin-top:12px;cursor:pointer;color:var(--fg);">
      <input id="remember" type="checkbox" style="width:auto;margin:0;"> 記住帳號
    </label>
    <button id="go">登入</button>
    <div id="err" class="err"></div>
  </div>

  <!-- 分析 -->
  <div id="report" class="hide"></div>

</div>

<script>
const $ = s => document.querySelector(s);
const fmtPct = v => (v==null ? '—' : (v>=0?'+':'') + v.toFixed(0) + '%');
const cls = v => v==null ? 'zero' : v>0 ? 'pos' : v<0 ? 'neg' : 'zero';
const avg = a => a.length ? a.reduce((x,y)=>x+y,0)/a.length : 0;
const median = a => { if(!a.length) return 0; const s=[...a].sort((x,y)=>x-y); return s[Math.floor(s.length/2)]; };

async function login(){
  const u=$('#u').value.trim(), p=$('#p').value;
  $('#go').disabled=true; $('#err').textContent='';
  try{
    const r = await fetch('/analysis/data',{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({user:u,pwd:p})});
    if(r.status===401){ $('#err').textContent='帳號或密碼錯誤'; $('#go').disabled=false; return; }
    const j = await r.json();
    if(!j.ok){ $('#err').textContent='讀取失敗：'+(j.error||'未知'); $('#go').disabled=false; return; }
    sessionStorage.setItem('an_u',u); sessionStorage.setItem('an_p',p);
    if($('#remember').checked) localStorage.setItem('an_remember_u',u);
    else localStorage.removeItem('an_remember_u');
    render(j);
  }catch(e){ $('#err').textContent='連線失敗：'+e.message; $('#go').disabled=false; }
}

function xtab(rows, label, keyFn, order){
  const g={};
  rows.forEach(r=>{ const k=keyFn(r); (g[k]=g[k]||[]).push(r.maxRet); });
  let keys=Object.keys(g); keys.sort(order||((a,b)=>a.localeCompare(b)));
  let body=keys.map(k=>{
    const a=g[k];
    return `<tr><td>${k}</td><td>${a.length}</td><td class="${cls(avg(a))}">${fmtPct(avg(a))}</td>
            <td class="${cls(median(a))}">${fmtPct(median(a))}</td><td class="${cls(Math.max(...a))}">${fmtPct(Math.max(...a))}</td></tr>`;
  }).join('');
  return `<div class="card"><h2>${label}</h2><div class="scroll"><table>
    <tr><th>分組</th><th>檔數</th><th>平均</th><th>中位</th><th>最佳</th></tr>${body}</table></div></div>`;
}

function render(j){
  $('#login').classList.add('hide');
  const rep=$('#report'); rep.classList.remove('hide');
  const rows=j.rows;
  const base=j.base0050;

  // 報酬分布
  const buckets=[[200,1e9,'+200%↑'],[100,200,'+100~200%'],[50,100,'+50~100%'],
    [30,50,'+30~50%'],[15,30,'+15~30%'],[5,15,'+5~15%'],[0,5,'0~+5%'],[-1e9,0,'負報酬']];
  let distRows=buckets.map(([lo,hi,lab])=>{
    const g=rows.filter(r=>r.maxRet>=lo&&r.maxRet<hi);
    if(!g.length) return '';
    return `<tr><td>${lab}</td><td>${g.length}</td><td style="text-align:left;color:var(--mut)">${g.map(r=>r.name).join('、')}</td></tr>`;
  }).join('');

  // 明細表
  const detail=rows.map(r=>`<tr>
    <td>${r.name}<br><span class="pill">${r.code}</span></td>
    <td>${r.entryMet}</td>
    <td>${r.everCount}種<br><span class="note">${r.everStrats}</span></td>
    <td>${r.windEntries}</td>
    <td>${r.windHoldDays==null?'—':r.windHoldDays+'天'}</td>
    <td>${r.maxStars}★</td>
    <td>${r.daysToPeak==null?'—':r.daysToPeak+'天'}</td>
    <td>${r.snaps}</td>
    <td class="${cls(r.maxRet)}">${fmtPct(r.maxRet)}</td>
    <td class="${cls(r.excess)}">${fmtPct(r.excess)}</td>
  </tr>`).join('');

  rep.innerHTML = `
    <h1>選股雷達 · 績效規則分析</h1>
    <div class="sub topline">
      <span>樣本 <b class="big">${j.count}</b> 檔</span>
      <span>大盤參考線 0050：<b class="${cls(base)}">${fmtPct(base)}</b>（超額報酬 = 個股 − 此線，近似）</span>
    </div>

    <div class="card findings">
      <h2>重點規律（探索性，非投資建議）</h2>
      <ul>
        <li><b>進入風口次數越多 ≠ 績效越好</b>：大贏家多數只進過一次風口。</li>
        <li><b>收錄後「多久觸頂」最關鍵</b>：一收錄就立刻見頂回落的多為弱勢；撐得住、慢慢創高的才是真標的（看下方「觸頂天數」分組）。</li>
        <li><b>策略別</b>：rd（研發/殖利率）穩定度通常優於 wind（風口，大樂透型）與 buyup。</li>
        <li><b>同時入選多策略</b>：以「生涯曾分別命中幾種策略」衡量（見明細「曾命中」欄）。</li>
      </ul>
    </div>

    <div class="card">
      <h2>績效軌跡圖（報酬%，事件標記）</h2>
      <select id="chartPick">${rows.map(r=>`<option value="${r.code}">${r.name}（${fmtPct(r.maxRet)}）</option>`).join('')}</select>
      <div class="chartwrap"><div id="chartBox"></div></div>
      <div class="legend">
        <span><i class="dot" style="background:#4493f8"></i>收錄入選</span>
        <span><i class="dot" style="background:#90a4b6"></i>每日快照</span>
        <span><i class="dot" style="background:#f85149"></i>風口停歇</span>
        <span><i class="dot" style="background:#e3b341"></i>升星/重觸發</span>
      </div>
      <h2 style="margin-top:18px">三大法人買賣超（同期，單位：張）</h2>
      <div class="chartwrap"><div id="instBox"><div class="note">選個股後載入…</div></div></div>
      <div class="legend">
        <span><i class="dot" style="background:#4493f8"></i>外資</span>
        <span><i class="dot" style="background:#e3b341"></i>投信</span>
        <span><i class="dot" style="background:#3fb950"></i>自營商</span>
        <span style="color:var(--txt2)">正＝買超(上) / 負＝賣超(下)</span>
      </div>
    </div>

    <div class="card"><h2>報酬分布（收錄價 → 軌跡最高價）</h2>
      <div class="scroll"><table><tr><th>報酬區間</th><th>檔數</th><th style="text-align:left">標的</th></tr>${distRows}</table></div></div>

    ${xtab(rows,'① 進入風口次數 vs 報酬', r=>'風口'+r.windEntries+'次', (a,b)=>parseInt(a.replace(/\\D/g,''))-parseInt(b.replace(/\\D/g,'')))}
    ${xtab(rows,'② 收錄策略別 vs 報酬', r=>'收錄='+r.entryMet)}
    ${xtab(rows,'③ 生涯曾命中策略種數 vs 報酬', r=>r.everCount+'種策略')}
    ${xtab(rows,'④ 漲完前最高星級 vs 報酬', r=>r.maxStars+'星')}
    ${xtab(rows,'⑤ 收錄到觸頂天數 vs 報酬', r=>{const d=r.daysToPeak; return d==null?'未知':d<=7?'≤7天':d<=21?'8~21天':d<=45?'22~45天':'>45天';})}
    ${xtab(rows,'⑥ 風口持續天數 vs 報酬（近似）', r=>{const d=r.windHoldDays; return d==null?'無風口/未知':d<=3?'≤3天':d<=10?'4~10天':'>10天';})}

    <div class="card"><h2>各檔明細（漲完前累積特徵）</h2>
      <div class="scroll"><table>
        <tr><th>標的</th><th>收錄策略</th><th>曾命中</th><th>風口次數</th><th>風口持續</th><th>最高星</th><th>觸頂天數</th><th>快照數</th><th>最大報酬</th><th>超額(vs0050)</th></tr>
        ${detail}
      </table></div>
    </div>

    <div class="card note">
      ⚠️ <b>限制</b>：① 樣本僅 ${j.count} 檔、快照不規則（靠手動「抓取行情」生成，時間軸有缺）→ 這是<b>探索性規律，非嚴謹回測</b>。
      ② 績效用「收錄→軌跡最高」＝最大潛在報酬（假設賣在最高，實際難達到）。
      ③ 0050 為單一參考線、非逐檔同期對照（近似）。④ <b>本頁僅供研究，非投資建議。</b>
    </div>
  `;
  // 軌跡圖綁定：預設顯示報酬最高那檔，可下拉切換
  window._anRows = rows;
  const pick = document.getElementById('chartPick');
  if(pick){ pick.addEventListener('change', ()=>drawChart(pick.value));
    let demo=rows[0],mx=-1;   // 預設顯示「風口停歇/升星」事件最多那檔，事件標記一目了然
    rows.forEach(r=>{const ev=(r.series||[]).filter(p=>p.type==='wind-lost'||p.type==='wind-retrigger').length; if(ev>mx){mx=ev;demo=r;}});
    pick.value=demo.code; drawChart(demo.code); }
}

function drawChart(code){
  const r=(window._anRows||[]).find(x=>x.code===code);
  const box=document.getElementById('chartBox');
  if(!r||!box) return;
  box.innerHTML=buildChartSVG(r);
  drawInst(code, r);          // 連動：軌跡圖下方買賣超副圖
}

// ── 三大法人買賣超副圖（與軌跡圖共用時間 X 軸對齊）──
async function drawInst(code, r){
  const ibox=document.getElementById('instBox');
  if(!ibox) return;
  ibox.innerHTML='<div class="note">三大法人買賣超載入中…</div>';
  const s=(r.series||[]).filter(p=>p.date);
  let xmin=null,xmax=null;
  if(s.length){ const xs=s.map(p=>new Date(String(p.date).slice(0,10)).getTime());
    xmin=Math.min(...xs); xmax=Math.max(...xs); }
  try{
    const res=await fetch('/inst/series?code='+encodeURIComponent(code)+'&days=60',{signal:AbortSignal.timeout(30000)});
    const j=await res.json();
    if(!j.ok||!j.series||!j.series.length){
      ibox.innerHTML='<div class="note">此檔尚無三大法人資料（每日 18:00 排程逐日累積；自營商自上線日起才有）。</div>'; return; }
    ibox.innerHTML=buildInstSVG(j.series, xmin, xmax);
  }catch(e){ ibox.innerHTML='<div class="note">三大法人資料載入失敗，稍後再試。</div>'; }
}

function buildInstSVG(series, xmin, xmax){
  const ts=d=>new Date(String(d).slice(0,10)).getTime();
  let s=(series||[]).filter(p=>p.date);
  // 對齊軌跡圖時間範圍（±1 日緩衝）
  if(xmin!=null&&xmax!=null) s=s.filter(p=>{const t=ts(p.date); return t>=xmin-864e5 && t<=xmax+864e5;});
  if(!s.length) return '<div class="note">此區間尚無三大法人資料。</div>';
  const W=700,L=44,R=12,H=150,T=10,Bm=20;
  let lo=xmin,hi=xmax;
  if(lo==null||hi==null){ const xs=s.map(p=>ts(p.date)); lo=Math.min(...xs); hi=Math.max(...xs); }
  const X=t=>L+(hi===lo?0.5:(t-lo)/(hi-lo))*(W-L-R);
  const mid=T+(H-T-Bm)/2, half=(H-T-Bm)/2-4;
  const lot=v=>v==null?null:v/1000;     // 股 → 張
  let maxAbs=1;
  s.forEach(p=>['f','t','d'].forEach(k=>{const v=lot(p[k]); if(v!=null) maxAbs=Math.max(maxAbs,Math.abs(v));}));
  const Yh=v=>(Math.abs(v)/maxAbs)*half;
  const cols={f:'#4493f8',t:'#e3b341',d:'#3fb950'}, nm={f:'外資',t:'投信',d:'自營商'}, order=['f','t','d'];
  const bw=Math.max(1.5, Math.min(5, (W-L-R)/Math.max(s.length,1)/4));
  let bars='';
  s.forEach(p=>{ const x=X(ts(p.date));
    order.forEach((k,gi)=>{ const v=lot(p[k]); if(v==null) return;
      const bx=x+(gi-1)*bw-bw/2, h=Math.max(0.6,Yh(v)), by=v>=0?mid-h:mid;
      const tip=`${p.date} ${nm[k]} ${v>=0?'+':''}${Math.round(v)}張`;
      bars+=`<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" fill="${cols[k]}"><title>${tip}</title></rect>`;
    });
  });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="min-width:560px">`
    +`<line x1="${L}" y1="${mid.toFixed(1)}" x2="${W-R}" y2="${mid.toFixed(1)}" stroke="#5a6b7a" stroke-width="1"/>`
    +`<text x="4" y="${(T+8).toFixed(1)}" fill="#90a4b6" font-size="10">買超</text>`
    +`<text x="4" y="${(mid+half+8).toFixed(1)}" fill="#90a4b6" font-size="10">賣超</text>`
    +`<text x="${(W-R).toFixed(1)}" y="${(T+8).toFixed(1)}" fill="#6e7d8a" font-size="9" text-anchor="end">滿格±${Math.round(maxAbs)}張</text>`
    +bars
    +`<text x="${L}" y="${(H-6).toFixed(1)}" fill="#90a4b6" font-size="11">${s[0].date}</text>`
    +`<text x="${(W-R).toFixed(1)}" y="${(H-6).toFixed(1)}" fill="#90a4b6" font-size="11" text-anchor="end">${s[s.length-1].date}</text>`
    +`</svg>`;
}

function buildChartSVG(r){
  const s=(r.series||[]).filter(p=>p.date);
  if(s.length<2) return '<div class="note">此檔快照太少（&lt;2 筆），畫不出軌跡。多開主頁按「抓取行情」可累積。</div>';
  const W=700,H=240,L=44,R=12,T=16,Bm=28;
  const ts=d=>new Date(String(d).slice(0,10)).getTime();
  const xs=s.map(p=>ts(p.date)); const xmin=Math.min(...xs),xmax=Math.max(...xs);
  const rets=s.map(p=>p.ret).filter(v=>v!=null);
  let ymin=Math.min(0,...rets),ymax=Math.max(0,...rets);
  if(ymax===ymin) ymax=ymin+1;
  const pd=(ymax-ymin)*0.12; ymin-=pd; ymax+=pd;
  const X=t=>L+(xmax===xmin?0.5:(t-xmin)/(xmax-xmin))*(W-L-R);
  const Y=v=>T+(1-(v-ymin)/(ymax-ymin))*(H-T-Bm);
  let path='',pen=false;
  s.forEach(p=>{ if(p.ret==null){pen=false;return;} const x=X(ts(p.date)),y=Y(p.ret);
    path+=(pen?'L':'M')+x.toFixed(1)+' '+y.toFixed(1)+' '; pen=true; });
  let yticks='';
  for(let k=0;k<=2;k++){ const v=ymin+(ymax-ymin)*k/2, y=Y(v);
    yticks+=`<line x1="${L}" y1="${y.toFixed(1)}" x2="${W-R}" y2="${y.toFixed(1)}" stroke="#26384a" stroke-width="0.5"/>`
          +`<text x="4" y="${(y+4).toFixed(1)}" fill="#90a4b6" font-size="11">${v.toFixed(0)}%</text>`; }
  // 事件標記：price=null 的事件(風口停歇)用「時間上最近的有效報酬」當 y，才畫得出來
  const validIdx=s.map((p,i)=>p.ret!=null?i:-1).filter(i=>i>=0);
  const yOf=i=>{ if(s[i].ret!=null) return Y(s[i].ret);
    let best=validIdx[0],bd=1e9; validIdx.forEach(vi=>{const d=Math.abs(vi-i);if(d<bd){bd=d;best=vi;}});
    return Y(best!=null?s[best].ret:0); };
  let marks='';
  s.forEach((p,i)=>{
    const x=X(ts(p.date)),y=yOf(i);
    const tip=`${p.date}　${p.ret!=null?((p.ret>=0?'+':'')+p.ret+'%　'):''}${p.type}${(p.met&&p.met.length)?' ['+p.met.join('+')+']':''}`;
    if(p.type==='entry'){
      marks+=`<circle cx='${x.toFixed(1)}' cy='${y.toFixed(1)}' r='5' fill='#4493f8'><title>${tip}</title></circle>`
            +`<text x='${x.toFixed(1)}' y='${(y-9).toFixed(1)}' fill='#4493f8' font-size='10' text-anchor='middle'>收錄</text>`;
    }else if(p.type==='wind-lost'){
      marks+=`<polygon points='${(x-5).toFixed(1)},${(y-5).toFixed(1)} ${(x+5).toFixed(1)},${(y-5).toFixed(1)} ${x.toFixed(1)},${(y+5).toFixed(1)}' fill='#f85149'><title>${tip}</title></polygon>`
            +`<text x='${x.toFixed(1)}' y='${(y+19).toFixed(1)}' fill='#f85149' font-size='10' text-anchor='middle'>停歇</text>`;
    }else if(p.type==='wind-retrigger'){
      marks+=`<rect x='${(x-4.5).toFixed(1)}' y='${(y-4.5).toFixed(1)}' width='9' height='9' transform='rotate(45 ${x.toFixed(1)} ${y.toFixed(1)})' fill='#e3b341'><title>${tip}</title></rect>`
            +`<text x='${x.toFixed(1)}' y='${(y-9).toFixed(1)}' fill='#e3b341' font-size='10' text-anchor='middle'>升${p.stars}星</text>`;
    }else if(p.ret!=null){
      marks+=`<circle cx='${x.toFixed(1)}' cy='${y.toFixed(1)}' r='2.5' fill='#90a4b6'><title>${tip}</title></circle>`;
    }
  });
  const y0=Y(0);
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="min-width:560px">`
    +yticks
    +`<line x1="${L}" y1="${y0.toFixed(1)}" x2="${W-R}" y2="${y0.toFixed(1)}" stroke="#5a6b7a" stroke-width="1" stroke-dasharray="4 3"/>`
    +`<path d="${path}" fill="none" stroke="#4493f8" stroke-width="1.6"/>`
    +marks
    +`<text x="${L}" y="${H-8}" fill="#90a4b6" font-size="11">${s[0].date}</text>`
    +`<text x="${W-R}" y="${H-8}" fill="#90a4b6" font-size="11" text-anchor="end">${s[s.length-1].date}</text>`
    +`</svg>`;
}

$('#go').addEventListener('click', login);
$('#p').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });

// 同分頁內重整免重登（關閉分頁即清，較安全）
window.addEventListener('load', ()=>{
  const ru=localStorage.getItem('an_remember_u');
  if(ru){ $('#u').value=ru; $('#remember').checked=true; $('#p').focus(); }
  const u=sessionStorage.getItem('an_u'), p=sessionStorage.getItem('an_p');
  if(u&&p){ $('#u').value=u; $('#p').value=p; login(); }
});
</script>
</body>
</html>
